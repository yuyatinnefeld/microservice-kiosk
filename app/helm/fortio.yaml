apiVersion: apps/v1
kind: Deployment
metadata:
  name: fortio
  namespace: istio-testapp
spec:
  replicas: 1
  selector:
    matchLabels:
      app: fortio
  template:
    metadata:
      labels:
        app: fortio
    spec:
      containers:
      - name: fortio
        image: fortio/fortio
---
apiVersion: v1
kind: Service
metadata:
  name: fortio
  namespace: istio-testapp
spec:
  selector:
    app: fortio
  ports:
  - protocol: TCP
    port: 8888
    targetPort: 80